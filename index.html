<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>교실에도 명당이 있을까?</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="survey-card" aria-live="polite">
        <div class="progress-wrap hidden" id="progressWrap">
          <div class="progress-label">
            <span id="progressText">1 / 9</span>
            <span id="stepTitle">설문</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <div id="screen" class="screen"></div>

        <p class="message" id="message" role="alert"></p>

        <div class="actions" id="actions"></div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
    <script src="phone-segments.js"></script>
    <script src="phone-complete.js"></script>
    <script src="classroom-layout.js"></script>
    <script src="classroom-realism.js"></script>
    <script src="ui-polish.js"></script>
    <script src="cover-polish.js"></script>
    <script src="submit-message-fix.js"></script>
    <script src="submit-form-bridge.js"></script>
  </body>
</html>
